
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablosiu | New Era</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #000000;
            --card: rgba(10, 10, 10, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- PRZYCISK POWROTU (LEWY GÓRNY RÓG) --- */
        .back-home {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .back-home.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .back-home:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
            transform: translateX(5px);
        }

        /* --- EKRAN STARTOWY --- */
        #overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        #overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        #overlay span {
            font-size: 14px;
            letter-spacing: 5px;
            font-weight: 200;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* --- TŁO WIDEO --- */
        #bgVideo {
            position: fixed;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            object-fit: cover;
            object-position: center;
            filter: brightness(0.5);
        }

        /* --- GŁÓWNA TREŚĆ --- */
        .main-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 500px;
            opacity: 0; 
            transform: translateY(20px);
            transition: all 1s ease;
        }

        .main-wrapper.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .profile-header { margin-bottom: 30px; text-align: center; }
        .av-box { position: relative; width: 110px; height: 110px; margin: 0 auto 20px; }
        .av-box img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid white; padding: 5px; object-fit: cover; }
        .av-box::after { content: ''; position: absolute; inset: -10px; border-radius: 50%; border: 1px dashed rgba(255,255,255,0.2); animation: spin 20s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .name { font-size: 40px; font-weight: 800; letter-spacing: -2px; }
        .loc { font-size: 10px; color: #aaa; letter-spacing: 1px; text-transform: uppercase; margin-top: 5px; max-width: 350px; line-height: 1.4; }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
        }

        @media (max-width: 400px) {
            .social-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .btn {
            aspect-ratio: 1/1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            border-color: white;
            transform: translateY(-5px);
            background: rgba(255,255,255,0.1);
        }

        .btn i { font-size: 22px; margin-bottom: 6px; }
        .btn span { font-size: 9px; font-weight: 800; opacity: 0.6; }

        #spotify { margin-top: 35px; font-size: 11px; color: #1DB954; font-weight: 600; display: none; align-items: center; gap: 10px; }
        .bar { width: 2px; height: 12px; background: #1DB954; animation: music 0.8s ease-in-out infinite alternate; }
        @keyframes music { from { height: 4px; } to { height: 14px; } }

        /* Styl powiadomienia */
        .copy-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 1px;
            z-index: 10000;
            transform: translateX(150%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .copy-notification.show {
            transform: translateX(0);
        }

        .copy-notification i { color: #1DB954; }

    </style>
</head>
<body>

    <a href="https://nalogowiec.pl/" class="back-home" id="backBtn">
        <i class="fas fa-arrow-left"></i> POWRÓT
    </a>

    <div id="copy-toast" class="copy-notification">
        <i class="fas fa-check-circle"></i> SKOPIOWANO TAG!
    </div>

    <div id="overlay" onclick="startExperience()">
        <span>[ CLICK TO ENTER ]</span>
    </div>

    <video muted loop playsinline id="bgVideo">
        <source src="background2.mp4" type="video/mp4">
    </video>

    <audio id="bgMusic" loop>
        <source src="background2.mp3" type="audio/mpeg">
    </audio>

    <div class="main-wrapper" id="content">
        <div class="profile-header">
            <div class="av-box">
                <img src="avatar.png" id="av" alt="Avatar">
            </div>
            <h1 class="name">Pablosiu</h1>
            <p class="loc">Ostatnia Aktualizacja: 20:59 dnia 21.02.2026</p>
        </div>

        <div class="social-grid">
            <a href="mailto:kontakt@nalogowiec.pl" class="btn"><i class="fas fa-envelope"></i><span>MAIL</span></a>
            <a href="https://youtube.com/@Pvblosiu" target="_blank" class="btn"><i class="fab fa-youtube"></i><span>YT</span></a>
            <a href="https://instagram.com/pawelek_z.adwokatem" target="_blank" class="btn"><i class="fab fa-instagram"></i><span>IG</span></a>
            <a href="https://github.com/itspablosiu" target="_blank" class="btn"><i class="fab fa-github"></i><span>GIT</span></a>
            <a href="#" onclick="copyDiscord()" class="btn"><i class="fab fa-discord"></i><span>DIS</span></a>
            <a href="https://steamcommunity.com/id/pablosiu/" target="_blank" class="btn"><i class="fab fa-steam"></i><span>STM</span></a>
            <a href="https://x.com/pablosiu_" target="_blank" class="btn"><i class="fab fa-x-twitter"></i><span>X</span></a>
            <a href="https://twitch.tv/clcv_" target="_blank" class="btn"><i class="fab fa-twitch"></i><span>TWITCH</span></a>
        </div>

        <div id="spotify">
            <div class="bar"></div>
            <span id="track-name">SŁUCHAM TERAZ</span>
        </div>
    </div>

    <script>
        function startExperience() {
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('content').classList.add('visible');
            document.getElementById('backBtn').classList.add('visible');

            const video = document.getElementById('bgVideo');
            video.play();

            const audio = document.getElementById('bgMusic');
            audio.play();
            audio.volume = 0.3;
        }

        const DISCORD_ID = "789133178144030737";
        const LFM_USER = "arkadivsz";
        const LFM_API_KEY = "0d22a6285362338637e9fe9eb97a1fd0";

        async function update() {
            try {
                const r = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const { data } = await r.json();
                if(data.discord_user.avatar) {
                    document.getElementById('av').src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${data.discord_user.avatar}.webp?size=256`;
                }
            } catch(e){}

            try {
                const r = await fetch(`https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${LFM_USER}&api_key=${LFM_API_KEY}&format=json&limit=1`);
                const data = await r.json();
                const track = data.recenttracks.track[0];
                const isPlaying = track['@attr']?.nowplaying === 'true';

                const sp = document.getElementById('spotify');
                if(isPlaying) {
                    sp.style.display = 'flex';
                    document.getElementById('track-name').innerText = track.name.toUpperCase();
                } else {
                    sp.style.display = 'none';
                }
            } catch(e){}
        }

        function copyDiscord() {
            navigator.clipboard.writeText('pablosiu_');
            const toast = document.getElementById('copy-toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        update();
        setInterval(update, 20000);
    </script>
</body>
</html>
